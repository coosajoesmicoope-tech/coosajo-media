<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesa Técnica COOSAJO - El Magic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .vumeter-bar { transition: height 0.1s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6">

    <header class="flex justify-between items-center mb-8 glass rounded-3xl p-6">
        <div class="flex items-center gap-4">
            <div class="bg-[#158e45] p-3 rounded-2xl">
                <i data-lucide="radio" class="w-8 h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-900 uppercase tracking-tighter leading-none">Mesa Técnica</h1>
                <p class="text-green-500 text-xs font-bold uppercase tracking-widest mt-1">Emisor "El Magic"</p>
            </div>
        </div>
        <img src="LOGO COOSAJO SIN ESLOGAN.png" class="h-12 object-contain" onerror="this.style.display='none'">
    </header>

    <main class="flex-1 grid grid-cols-12 gap-6">
        <div class="col-span-8 flex flex-col gap-4">
            <div class="relative flex-1 bg-black rounded-[2rem] overflow-hidden border-4 border-slate-700 shadow-2xl flex items-center justify-center">
                <video id="localVideo" class="w-full h-full object-contain" autoplay muted playsinline></video>
                <div id="noSignal" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                    <i data-lucide="video-off" class="w-16 h-16 mb-4 opacity-20"></i>
                    <p class="font-bold uppercase tracking-widest opacity-40">Esperando señal de OBS</p>
                </div>
            </div>

            <div class="glass rounded-3xl p-6 flex gap-4">
                <button onclick="startCapture()" class="flex-1 bg-slate-700 hover:bg-slate-600 p-4 rounded-2xl flex items-center justify-center gap-3 transition-all font-bold uppercase text-sm">
                    <i data-lucide="monitor"></i> 1. Capturar OBS/Stick
                </button>
                <button id="btnStream" onclick="toggleStream()" disabled class="flex-1 bg-green-600/20 text-green-500 border border-green-600/30 p-4 rounded-2xl flex items-center justify-center gap-3 transition-all font-bold uppercase text-sm cursor-not-allowed">
                    <i data-lucide="play-circle"></i> 2. Iniciar Emisión
                </button>
            </div>
        </div>

        <div class="col-span-4 flex flex-col gap-6">
            <div id="idContainer" class="glass rounded-3xl p-8 text-center border-2 border-green-500/30">
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">ID para Agencias</p>
                <div id="peer-id" class="text-4xl font-black text-green-500 tracking-tighter">CONECTANDO...</div>
                <div id="errorMessage" class="hidden mt-2 text-red-400 text-[10px] uppercase font-bold">Error de Conexión en este entorno</div>
            </div>

            <!-- VU Meter -->
            <div class="glass rounded-3xl p-6 flex-1">
                <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">Monitor de Audio</h3>
                <div class="flex justify-between items-end h-40 px-4 gap-1">
                    <div class="flex-1 bg-green-500/20 rounded-t-lg relative overflow-hidden"><div id="v1" class="absolute bottom-0 w-full bg-green-500 vumeter-bar" style="height: 0%"></div></div>
                    <div class="flex-1 bg-green-500/20 rounded-t-lg relative overflow-hidden"><div id="v2" class="absolute bottom-0 w-full bg-green-500 vumeter-bar" style="height: 0%"></div></div>
                    <div class="flex-1 bg-green-500/20 rounded-t-lg relative overflow-hidden"><div id="v3" class="absolute bottom-0 w-full bg-green-500 vumeter-bar" style="height: 0%"></div></div>
                    <div class="flex-1 bg-green-500/20 rounded-t-lg relative overflow-hidden"><div id="v4" class="absolute bottom-0 w-full bg-yellow-500 vumeter-bar" style="height: 0%"></div></div>
                    <div class="flex-1 bg-green-500/20 rounded-t-lg relative overflow-hidden"><div id="v5" class="absolute bottom-0 w-full bg-red-500 vumeter-bar" style="height: 0%"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let localStream;
        let peer;
        let isStreaming = false;

        function initPeer() {
            try {
                const randomId = Math.floor(1000 + Math.random() * 9000);
                peer = new Peer(`COOSAJO-${randomId}`);

                peer.on('open', (id) => {
                    document.getElementById('peer-id').textContent = id;
                });

                peer.on('error', (err) => {
                    console.error("PeerJS Error:", err);
                    document.getElementById('peer-id').textContent = "ERROR";
                    document.getElementById('errorMessage').classList.remove('hidden');
                });

                peer.on('call', (call) => {
                    if (localStream) {
                        call.answer(localStream);
                    }
                });
            } catch (e) {
                document.getElementById('peer-id').textContent = "BLOQUEADO";
            }
        }

        async function startCapture() {
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { frameRate: 60 },
                    audio: true
                });
                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('noSignal').classList.add('hidden');
                const btn = document.getElementById('btnStream');
                btn.disabled = false;
                btn.classList.remove('bg-green-600/20', 'text-green-500', 'cursor-not-allowed');
                btn.classList.add('bg-green-600', 'text-white');
                setupVisualizer(localStream);
            } catch (err) {
                console.error("Error capturando:", err);
            }
        }

        function toggleStream() {
            if (!isStreaming) {
                isStreaming = true;
                document.getElementById('btnStream').innerHTML = `<i data-lucide="square"></i> Detener`;
                document.getElementById('btnStream').classList.replace('bg-green-600', 'bg-red-600');
            } else {
                location.reload();
            }
            lucide.createIcons();
        }

        function setupVisualizer(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 32;
            source.connect(analyser);
            const data = new Uint8Array(analyser.frequencyBinCount);
            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(data);
                for(let i=1; i<=5; i++) {
                    const h = (data[i*2] / 255) * 100;
                    document.getElementById(`v${i}`).style.height = h + '%';
                }
            }
            draw();
        }

        initPeer();
    </script>
</body>
</html>
