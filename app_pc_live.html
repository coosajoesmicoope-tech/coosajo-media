<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla Agencia COOSAJO (Híbrido Nube)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #f1f5f9; margin: 0; cursor: none; }
        .bg-abstract { background-image: url('abstract-white-background-with-elegant-curving-lin-2026-01-07-23-20-12-utc.jpg'); background-size: cover; background-position: center; opacity: 0.6; position: absolute; inset: 0; z-index: 0; }
        
        .video-frame {
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        #sidebar { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 30%; }
        #sidebar.hidden-sidebar { width: 0; opacity: 0; margin-right: -1.25rem; transform: translateX(-40px); }
        #mainFooter.hidden-footer { height: 0; border-width: 0; opacity: 0; margin: 0; padding: 0; }

        /* Contenedor WebRTC Pantalla Completa Absoluta */
        #liveFullscreenContainer {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: black;
            display: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        #liveVideoWebRTC {
            width: 100%;
            height: 100%;
            object-fit: fill;
        }

        /* Marquesina (Ticker) */
        @keyframes scroll-left { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: scroll-left 40s linear infinite; }
    </style>
</head>
<body class="w-full h-screen flex flex-col relative bg-[#f1f5f9]">

    <!-- FONDO -->
    <div class="bg-abstract"></div>
    
    <!-- HEADER MÁS PEQUEÑO Y ESTÉTICO -->
    <header id="mainHeader" class="relative z-50 h-[70px] bg-white border-b-[4px] border-[#158e45] flex items-center justify-between px-6 shadow-md transition-opacity duration-1000 shrink-0">
        <div class="flex items-center gap-4">
            <img src="LOGO COOSAJO SIN ESLOGAN.png" alt="COOSAJO" class="h-10 object-contain" onerror="this.style.display='none'">
            
            <!-- Redes Sociales -->
            <div class="flex gap-6 items-center border-l-2 border-slate-200 pl-6">
                <div class="flex items-center gap-2.5"><img src="LOGO FACEBOOK.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'"/><span class="font-black text-[15px] text-[#172e59]">COOSAJO</span></div>
                <div class="flex items-center gap-2.5"><img src="LOGO INSTA.png" class="w-6 h-6 object-contain" onerror="this.style.display='none'"/><span class="font-black text-[15px] text-[#172e59]">coosajoesmicoope</span></div>
                <div class="flex items-center gap-2.5"><i data-lucide="globe" class="w-5 h-5 text-[#158e45]"></i><span class="font-black text-[15px] text-[#172e59]">www.coosajo.com</span></div>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <!-- Temperatura -->
            <div class="flex items-center gap-2 border-l-[3px] border-slate-100 pl-6">
                <i id="weatherIcon" data-lucide="thermometer" class="w-7 h-7 text-[#158e45]"></i>
                <div>
                    <div id="tempValue" class="font-black text-2xl text-[#172e59] leading-none tracking-tighter">--°C</div>
                    <div class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Esquipulas</div>
                </div>
            </div>

            <!-- Reloj -->
            <div class="text-right border-l-[3px] border-slate-100 pl-6">
                <div id="clockTime" class="font-black text-3xl text-[#172e59] leading-none tracking-tighter">--:--</div>
                <div id="clockDate" class="text-[8px] text-[#158e45] font-black uppercase mt-0.5 tracking-widest">Cargando...</div>
            </div>
        </div>
    </header>

    <!-- ÁREA PRINCIPAL -->
    <main id="mainContent" class="relative z-10 flex-1 flex gap-5 p-5 min-h-0 transition-opacity duration-1000">
        
        <!-- SIDEBAR PARA BANNERS (IMÁGENES) -->
        <div id="sidebar" class="h-full relative overflow-hidden flex-shrink-0 video-frame">
            <img id="mainBannerBlur" src="" class="absolute inset-0 w-full h-full object-cover blur-3xl opacity-0 z-0 transition-opacity duration-1000 scale-125" />
            
            <img id="mainBanner" src="" class="absolute inset-0 w-full h-full object-contain z-10 opacity-0 transition-opacity duration-1000 drop-shadow-2xl" />
            <div id="emptyBannerText" class="absolute inset-0 flex items-center justify-center text-slate-400 font-bold uppercase tracking-widest text-xs opacity-50 z-0">Sin Banners</div>
        </div>

        <div class="flex-1 min-w-0 h-full relative overflow-hidden flex items-center justify-center video-frame">
            
            <video id="mainVideoBlur" class="absolute inset-0 w-full h-full object-cover blur-3xl opacity-0 z-0 transition-opacity duration-1000 scale-125" playsinline webkit-playsinline muted loop></video>
            <video id="mainVideo" class="absolute inset-0 w-full h-full object-contain z-10 opacity-0 transition-opacity duration-1000 drop-shadow-2xl" playsinline webkit-playsinline></video>
            
            <div id="emptyVideoText" class="absolute inset-0 flex flex-col items-center justify-center bg-transparent z-0">
                <img src="LOGO COOSAJO SIN ESLOGAN.png" class="h-24 opacity-20 mb-4 brightness-0 invert" onerror="this.style.display='none'">
                <p class="text-slate-500 font-bold uppercase tracking-widest text-xs opacity-30">Lista de Videos Vacía</p>
            </div>
        </div>
    </main>

    <!-- BARRA INFERIOR DE INFORMACIÓN (TICKER) -->
    <footer id="mainFooter" class="h-20 bg-[#172e59] flex items-center relative overflow-hidden shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] border-t-[4px] border-[#158e45] z-50 transition-all duration-1000 hidden-footer">
        <div id="marqueeContainer" class="absolute whitespace-nowrap animate-marquee flex items-center gap-32">
            <!-- Textos dinámicos desde la nube -->
        </div>
    </footer>

    <!-- MODO EN VIVO (PANTALLA COMPLETA TOTAL) -->
    <div id="liveFullscreenContainer">
        <video id="liveVideoWebRTC" autoplay playsinline></video>
        <div id="liveLoadingFullscreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black z-10">
            <h2 id="liveLoadingText" class="text-4xl font-black uppercase tracking-[0.4em] text-slate-300 mb-8 italic animate-pulse">Conectando a Mesa Técnica...</h2>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        lucide.createIcons();

        const firebaseConfig = {
            apiKey: "AIzaSyC643shoxAKAaZszMw2RhZXLdZVhniw8xo",
            authDomain: "coosajo-tv.firebaseapp.com",
            projectId: "coosajo-tv",
            storageBucket: "coosajo-tv.firebasestorage.app",
            messagingSenderId: "430153476647",
            appId: "1:430153476647:web:d8925c9a6e8bdad0123c02",
            measurementId: "G-0DDHHXY21D"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).catch(err => console.error("Error Auth:", err));

        const mainHeader = document.getElementById('mainHeader');
        const mainContent = document.getElementById('mainContent');
        const mainFooter = document.getElementById('mainFooter');
        const mainBanner = document.getElementById('mainBanner');
        const mainVideo = document.getElementById('mainVideo');
        
        const liveFullscreenContainer = document.getElementById('liveFullscreenContainer');
        const liveVideoWebRTC = document.getElementById('liveVideoWebRTC');
        const liveLoadingFullscreen = document.getElementById('liveLoadingFullscreen');
        const liveLoadingText = document.getElementById('liveLoadingText');

        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    {
                        urls: 'turn:openrelay.metered.ca:443?transport=tcp',
                        username: 'openrelayproject',
                        credential: 'openrelayproject'
                    }
                ]
            }
        });
        let activeCall = null;
        let isLiveActive = false;
        let connectionTimeout = null;
        const appLoadTime = Date.now();
        
        let agencyId = localStorage.getItem('agencyId');
        if (!agencyId) {
            agencyId = 'Agencia-' + Math.floor(Math.random() * 100000);
            localStorage.setItem('agencyId', agencyId);
        }

        async function sendHeartbeat() {
            try {
                const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js");
                let currentStatus = "Anuncios";
                if (isLiveActive) currentStatus = "En Vivo";
                if (!liveLoadingFullscreen.classList.contains('hidden') && liveFullscreenContainer.style.display !== 'none') {
                    currentStatus = "Intentando Conectar a Mesa";
                }
                
                await setDoc(doc(db, "artifacts", "broadcast-system", "agencies", agencyId), {
                    lastPing: Date.now(),
                    status: currentStatus,
                    version: "1.0.18",
                    peerConnected: peer && !peer.disconnected
                });
            } catch(e) { console.error("Heartbeat fail", e); }
        }
        setInterval(sendHeartbeat, 10000); // Latido cada 10 segundos
        setTimeout(sendHeartbeat, 3000);

        let imagesPlaylist = [];
        let videosPlaylist = [];
        let currentImageIndex = 0;
        let currentVideoIndex = 0;
        let imageTimer = null;
        let isVideoLooping = false;
        let isImageLooping = false;

        // ESPERAR A QUE PEERJS ESTÉ LISTO ANTES DE LEER FIREBASE
        let listenersStarted = false;

        peer.on('open', (id) => {
            console.log("Conectado al servidor de llamadas con ID:", id);
            if(!listenersStarted) {
                listenersStarted = true;
                startHybridListeners();
            }
        });

        peer.on('error', (err) => {
            console.error("Error PeerJS:", err);
            
            // Si estaba en vivo y falló
            if(isLiveActive && !liveFullscreenContainer.classList.contains('hidden')) {
                liveLoadingText.innerHTML = "Error de Señal: " + (err.type || 'Desconocido');
                liveLoadingText.className = "text-2xl font-black uppercase tracking-[0.2em] text-red-500 mb-8";
            }
            
            // Si nunca arrancó, forzamos arranque para que la publicidad sirva
            if(!listenersStarted) {
                listenersStarted = true;
                startHybridListeners();
            }
        });

        function startHybridListeners() {
            onSnapshot(doc(db, 'artifacts', 'broadcast-system', 'platform', 'state'), (docSnap) => {
                if (!docSnap.exists()) return;
                const state = docSnap.data();
                
                if (state.marqueeSpeed) {
                    const marquee = document.getElementById('marqueeContainer');
                    if (marquee) marquee.style.animationDuration = `${state.marqueeSpeed}s`;
                }
                
                if (state.isLive && state.masterId) {
                    isLiveActive = true;
                    
                    mainVideo.pause();
                    clearTimeout(imageTimer);
                    
                    // Ocultar TODO
                    mainHeader.style.opacity = '0';
                    mainContent.style.opacity = '0';
                    mainFooter.style.opacity = '0';

                    liveFullscreenContainer.style.display = 'block';
                    setTimeout(() => liveFullscreenContainer.style.opacity = '1', 50);
                    liveLoadingFullscreen.classList.remove('hidden');
                    liveLoadingText.innerHTML = "Conectando a Mesa Técnica...";
                    liveLoadingText.className = "text-4xl font-black uppercase tracking-[0.4em] text-slate-300 mb-8 italic animate-pulse";

                    conectarWebRTC(state.masterId);
                } else {
                    if(isLiveActive) {
                        isLiveActive = false;
                        desconectarWebRTC();
                        
                        liveFullscreenContainer.style.opacity = '0';
                        setTimeout(() => liveFullscreenContainer.style.display = 'none', 1000);
                        
                        mainHeader.style.opacity = '1';
                        mainContent.style.opacity = '1';
                        mainFooter.style.opacity = '1';
                        
                        if(videosPlaylist.length > 0) { isVideoLooping = true; playNextVideo(); }
                        if(imagesPlaylist.length > 0) { isImageLooping = true; playNextImage(); }
                    }
                }
            });

            onSnapshot(collection(db, "signage_media"), async (snapshot) => {
                let rawMedia = [];
                snapshot.forEach((doc) => {
                    rawMedia.push({ id: doc.id, ...doc.data() });
                });
                
                // Mostrar indicador de sincronización si hay muchos archivos nuevos
                if (!isLiveActive && rawMedia.length > 0) {
                    liveLoadingFullscreen.classList.remove('hidden');
                    liveLoadingText.innerHTML = "Sincronizando Videos Nuevos (Offline Cache)...";
                    liveLoadingText.className = "text-2xl font-black uppercase tracking-widest text-blue-400 mb-8 animate-pulse";
                    liveFullscreenContainer.classList.remove('hidden');
                    liveFullscreenContainer.style.opacity = '1';
                }

                // Esperar a que main.js descargue/elimine los archivos y devuelva las rutas file://
                let syncedMedia = [];
                try {
                    syncedMedia = await window.electronAPI.syncMedia(rawMedia);
                } catch(e) {
                    console.error("Fallo al sincronizar medios locales, usando nube", e);
                    syncedMedia = rawMedia;
                }

                let newImages = [];
                let newVideos = [];
                
                syncedMedia.forEach((data) => {
                    if(data.type.startsWith('video')) newVideos.push(data);
                    else newImages.push(data);
                });
                
                newImages.sort((a, b) => a.timestamp - b.timestamp);
                newVideos.sort((a, b) => a.timestamp - b.timestamp);
                
                imagesPlaylist = newImages;
                videosPlaylist = newVideos;
                
                // Ocultar indicador
                if (!isLiveActive) {
                    liveFullscreenContainer.style.opacity = '0';
                    setTimeout(() => liveFullscreenContainer.classList.add('hidden'), 500);
                }
                
                if(!isLiveActive) {
                    if(!isImageLooping && imagesPlaylist.length > 0) {
                        isImageLooping = true; currentImageIndex = 0; playNextImage();
                    } else if (imagesPlaylist.length === 0) {
                        isImageLooping = false; mainBanner.style.opacity = '0'; clearTimeout(imageTimer);
                    }

                    if(!isVideoLooping && videosPlaylist.length > 0) {
                        isVideoLooping = true; currentVideoIndex = 0; playNextVideo();
                    } else if (videosPlaylist.length === 0) {
                        isVideoLooping = false; mainVideo.style.opacity = '0'; mainVideo.pause();
                        const blurEl = document.getElementById('mainVideoBlur');
                        if(blurEl) { blurEl.style.opacity = '0'; blurEl.pause(); }
                    }
                }
            });

            // ESCUCHADOR DE TEXTOS (TICKER)
            onSnapshot(collection(db, "signage_ticker"), (snapshot) => {
                let texts = [];
                snapshot.forEach(doc => texts.push(doc.data()));
                texts.sort((a, b) => a.timestamp - b.timestamp);

                const marquee = document.getElementById('marqueeContainer');
                if (texts.length === 0) {
                    mainFooter.classList.add('hidden-footer');
                    marquee.innerHTML = '';
                } else {
                    mainFooter.classList.remove('hidden-footer');
                    
                    // Triplicamos los textos para asegurar que el scroll infinito no deje huecos vacíos
                    const renderTexts = [...texts, ...texts, ...texts];
                    let html = '';
                    renderTexts.forEach(t => {
                        const isHighlight = t.icon === 'zap' || t.icon === 'star' || t.icon === 'megaphone';
                        const textColor = isHighlight ? 'text-yellow-400' : 'text-white';
                        const iconColor = isHighlight ? 'text-yellow-400' : 'text-[#158e45]';
                        const textStr = (t.text || '').toUpperCase();
                        
                        html += `
                            <span class="${textColor} text-3xl font-black tracking-widest flex items-center gap-4">
                                <i data-lucide="${t.icon || 'info'}" class="w-8 h-8 ${iconColor}"></i>
                                ${textStr}
                            </span>
                        `;
                    });
                    marquee.innerHTML = html;
                    lucide.createIcons();
                }
            });

            // ESCUCHADOR DE COMANDOS REMOTOS (Actualización / Reinicio)
            onSnapshot(doc(db, "artifacts", "broadcast-system", "commands", "update"), (docSnap) => {
                if (!docSnap.exists()) return;
                const cmd = docSnap.data();
                // Solo reaccionar a comandos lanzados DESPUÉS de haber cargado la app
                if (cmd.action === 'force_restart' && cmd.timestamp > appLoadTime) {
                    liveLoadingFullscreen.classList.remove('hidden');
                    liveLoadingText.innerHTML = "ACTUALIZANDO...";
                    liveFullscreenContainer.style.display = 'block';
                    liveFullscreenContainer.style.opacity = '1';
                    
                    setTimeout(() => {
                        if (window.electronAPI) window.electronAPI.restartApp();
                        else window.location.reload();
                    }, 2000);
                }
            });
        }

        function playNextVideo() {
            const blurEl = document.getElementById('mainVideoBlur');
            if (isLiveActive || videosPlaylist.length === 0) {
                isVideoLooping = false;
                mainVideo.style.opacity = '0';
                if(blurEl) { blurEl.style.opacity = '0'; blurEl.pause(); }
                return;
            }
            isVideoLooping = true;
            
            if (currentVideoIndex >= videosPlaylist.length) currentVideoIndex = 0;
            
            const file = videosPlaylist[currentVideoIndex];
            mainVideo.src = file.url;
            mainVideo.style.opacity = "1";
            mainVideo.muted = false; // <-- Arreglo crítico para que regrese el audio
            mainVideo.volume = 1.0;
            
            if (blurEl) {
                blurEl.src = file.url;
                blurEl.style.opacity = "0.5";
                blurEl.muted = true; // <-- Evita eco
                blurEl.play().catch(e => console.log("Aura blocked", e));
            }

            mainVideo.play().catch(() => {
                mainVideo.muted = true;
                mainVideo.play();
            });

            mainVideo.onerror = () => {
                console.error("Error al cargar o reproducir el video:", file.url);
                setTimeout(() => {
                    currentVideoIndex = (currentVideoIndex + 1) % videosPlaylist.length;
                    playNextVideo();
                }, 2000);
            };

            mainVideo.onended = () => {
                currentVideoIndex = (currentVideoIndex + 1) % videosPlaylist.length;
                playNextVideo();
            };
        }

        function playNextImage() {
            if (isLiveActive || imagesPlaylist.length === 0) {
                isImageLooping = false;
                mainBanner.style.opacity = '0';
                return;
            }
            isImageLooping = true;
            if (currentImageIndex >= imagesPlaylist.length) currentImageIndex = 0;
            
            const file = imagesPlaylist[currentImageIndex];
            mainBanner.src = file.url;
            mainBanner.style.opacity = "1";
            
            const blurEl = document.getElementById('mainBannerBlur');
            if(blurEl) {
                blurEl.src = file.url;
                blurEl.style.opacity = "0.5";
            }
            
            const waitTime = (file.durationSecs || 10) * 1000;
            
            imageTimer = setTimeout(() => {
                currentImageIndex = (currentImageIndex + 1) % imagesPlaylist.length;
                playNextImage();
            }, waitTime);
        }

        function getDummyStream() {
            const canvas = document.createElement('canvas');
            canvas.width = 1; canvas.height = 1;
            const stream = canvas.captureStream(1); // 1 FPS
            
            // Agregar pista de audio falsa
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            stream.addTrack(dest.stream.getAudioTracks()[0]);
            
            return stream;
        }

        function conectarWebRTC(masterId) {
            if (activeCall) return;
            
            connectionTimeout = setTimeout(() => {
                if (!liveLoadingFullscreen.classList.contains('hidden')) {
                    liveLoadingText.innerHTML = "Mesa Técnica Apagada o Inaccesible";
                    liveLoadingText.className = "text-3xl font-black uppercase tracking-[0.2em] text-red-500 mb-8 italic";
                    setTimeout(() => {
                        desconectarWebRTC();
                        
                        isLiveActive = false;
                        
                        liveFullscreenContainer.style.opacity = '0';
                        setTimeout(() => liveFullscreenContainer.style.display = 'none', 1000);
                        
                        mainHeader.style.opacity = '1';
                        mainContent.style.opacity = '1';
                        mainFooter.style.opacity = '1';
                        
                        if(videosPlaylist.length > 0) { isVideoLooping = true; playNextVideo(); }
                        if(imagesPlaylist.length > 0) { isImageLooping = true; playNextImage(); }
                    }, 3000);
                }
            }, 30000); // 30 SEGUNDOS DE TOLERANCIA

            activeCall = peer.call(masterId, getDummyStream());
            
            activeCall.on('stream', (stream) => {
                clearTimeout(connectionTimeout);
                liveLoadingFullscreen.classList.add('hidden');
                
                liveVideoWebRTC.srcObject = stream;
                liveVideoWebRTC.muted = false; 
                liveVideoWebRTC.volume = 1.0;
                liveVideoWebRTC.play().catch(e => console.log("Autoplay bloqueado", e));
            });

            activeCall.on('close', () => {
                desconectarWebRTC();
                
                isLiveActive = false;
                
                liveFullscreenContainer.style.opacity = '0';
                setTimeout(() => liveFullscreenContainer.style.display = 'none', 1000);
                
                mainHeader.style.opacity = '1';
                mainContent.style.opacity = '1';
                mainFooter.style.opacity = '1';
                
                if(videosPlaylist.length > 0) { isVideoLooping = true; playNextVideo(); }
                if(imagesPlaylist.length > 0) { isImageLooping = true; playNextImage(); }
            });
            
            activeCall.on('error', (err) => {
                console.error("Error WebRTC:", err);
                clearTimeout(connectionTimeout);
                desconectarWebRTC();
            });
        }

        function desconectarWebRTC() {
            clearTimeout(connectionTimeout);
            if (activeCall) {
                activeCall.close();
                activeCall = null;
            }
            liveVideoWebRTC.srcObject = null;
        }

        // ==========================================
        // RELOJ Y CLIMA (Open-Meteo)
        // ==========================================
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // la hora '0' debe ser '12'
            const timeString = `${String(hours).padStart(2, '0')}:${minutes} ${ampm}`;
            document.getElementById('clockTime').textContent = timeString;
            document.getElementById('clockDate').textContent = now.toLocaleDateString('es-GT', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
        }
        setInterval(updateClock, 1000); updateClock();

        async function fetchWeather() {
            try {
                // Coordenadas de Esquipulas, Guatemala
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=14.5667&longitude=-89.35&current_weather=true');
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const isDay = data.current_weather.is_day;
                
                document.getElementById('tempValue').textContent = `${temp}°C`;
                
                const icon = document.getElementById('weatherIcon');
                if (temp > 28) {
                    icon.setAttribute('data-lucide', isDay ? 'sun' : 'moon');
                    icon.className = 'w-8 h-8 text-orange-500';
                } else if (temp < 15) {
                    icon.setAttribute('data-lucide', 'cloud-rain');
                    icon.className = 'w-8 h-8 text-blue-500';
                } else {
                    icon.setAttribute('data-lucide', isDay ? 'cloud-sun' : 'cloud-moon');
                    icon.className = 'w-8 h-8 text-[#158e45]';
                }
                lucide.createIcons();
            } catch (e) {
                console.error("Error obteniendo clima:", e);
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000); // Actualizar clima cada 10 minutos

    </script>
</body>
</html>
